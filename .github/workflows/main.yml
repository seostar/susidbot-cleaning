name: Cleaner Bot
on:
  schedule:
    # 1. Щоденне тихе сканування (22:30 Київ Літо = 19:30 UTC)
    - cron: '30 19 * * *'
    
    # 2. Привітання 1-го числа (08:30 Київ Літо = 05:30 UTC)
    - cron: '30 5 1 * *'
    
    # 3. Звіт 11-го числа (11:30 Київ Літо = 08:30 UTC)
    - cron: '30 8 11 * *'
    
    # 4. Нагадування 19-го числа (11:30 Київ Літо = 08:30 UTC)
    - cron: '30 8 19 * *'
    
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: {python-version: '3.9'}
      # Додано requests для роботи з Google
      - run: pip install pyTelegramBotAPI pytz requests
      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          THREAD_ID: ${{ secrets.THREAD_ID }}
          # Додано URL скрипта
          GOOGLE_SCRIPT_URL: ${{ secrets.GOOGLE_SCRIPT_URL }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python bot.py
      - name: Save History
        run: |
          git config --global user.name "SusidBot"
          git config --global user.email "bot@users.noreply.github.com"
          git add history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Update history [skip ci]" && git push)
